# Development and production environment setup

version: '3.8'

services:
  # Gully Fame Admin Dashboard
  admin:
    build:
      context: ./apps/gully-fame-admin
      dockerfile: Dockerfile
    container_name: gfm-admin
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://103.194.228.68:3552/v1/api/
    volumes:
      - ./apps/gully-fame-admin:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - gfm-network

  # Backend API (if running locally)
  # Uncomment if you want to run backend in Docker
  # api:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: gfm-api
  #   ports:
  #     - "3552:3552"
  #   environment:
  #     - NODE_ENV=production
  #     - PORT=3552
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #   restart: unless-stopped
  #   networks:
  #     - gfm-network

  # Redis Cache (Optional)
  # redis:
  #   image: redis:7-alpine
  #   container_name: gfm-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   networks:
  #     - gfm-network

  # PostgreSQL Database (Optional)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: gfm-postgres
  #   environment:
  #     - POSTGRES_USER=gfm_user
  #     - POSTGRES_PASSWORD=gfm_password
  #     - POSTGRES_DB=gfm_db
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - gfm-network

networks:
  gfm-network:
    driver: bridge

