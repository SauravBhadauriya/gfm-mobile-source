# Created by Kiro - Yarn Configuration
# Global yarn settings for the project

# Node modules linker
nodeLinker: node-modules

# Enable strict SSL
enableScripts: true

# Compression level
compressionLevel: mixed

# Network timeout
httpTimeout: 60000

# Registry
npmRegistryServer: https://registry.npmjs.org

# Enable telemetry
enableTelemetry: false

# Workspace configuration
workspaces:
  - apps/gully-fame-mobile
  - apps/gully-fame-admin
  - apps/videoeditor
